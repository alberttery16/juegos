<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos - Acceder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body class="premium-body premium-login">
    <div class="premium-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="premium-login-box">
        <div class="login-brand">
            <h1>PLAY<span>HUB</span></h1>
            <p>Accede a tu biblioteca virtual</p>
        </div>

        <form action="paginaPrincipal.html" method="get" class="premium-form">
            <div class="premium-input">
                <input type="text" id="nombre" name="nombre" placeholder="Nombre de usuario" required autocomplete="off">
            </div>

            <div class="premium-input">
                <input type="email" id="correo" name="correo" placeholder="Correo electrónico" required autocomplete="off">
            </div>

            <div class="premium-input">
                <input type="password" id="contraseña" name="contraseña" placeholder="Contraseña" required autocomplete="off">
            </div>

            <button type="submit" class="btn-epic">
                <span>INICIAR SESIÓN</span>
            </button>
            
            <div class="login-footer">
                <a href="privacy-policy.html" target="_blank" rel="noopener noreferrer">Privacidad y Términos</a>
            </div>
        </form>
    </div>
</body>
</html>
