<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE_LOGIN // COM_GAMES</title>
    <!-- Add neon fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body class="arcade-login-body">
    <div class="login-wrapper">
        <div class="cyber-scanline"></div>
        <div class="login-box cyber-ui">
            <h1 class="glitch-text" data-text="SYS_AUTH">SYS_AUTH</h1>
            <p class="subtitle">> Ingrese credenciales de acceso</p>

            <form action="paginaPrincipal.html" method="get" class="cyber-form">
                <div class="input-group">
                    <label for="nombre">USER_ID</label>
                    <input type="text" id="nombre" name="nombre" placeholder="_identificación" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="correo">EMAIL_UPLINK</label>
                    <input type="email" id="correo" name="correo" placeholder="_comlink" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="contraseña">PASSWORD</label>
                    <input type="password" id="contraseña" name="contraseña" placeholder="_" required autocomplete="off">
                </div>

                <button type="submit" class="cyber-btn">[ AUTHENTICATE ]</button>
                
                <footer class="login-footer">
                    <a href="privacy-policy.html" target="_blank" rel="noopener noreferrer">Ver Política de Privacidad del Sistema</a>
                </footer>
            </form>
        </div>
    </div>
</body>
</html>
