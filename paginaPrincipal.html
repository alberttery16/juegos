<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB_PRINCIPAL // COM_GAMES</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body class="arcade-hub-body">
    <div class="cyber-scanline"></div>
    <header class="hub-header">
        <h1 class="glitch-text" data-text="GAME_DATABANKS">GAME_DATABANKS</h1>
        <p class="subtitle">> Selecciona un cartucho virtual para iniciar simulación</p>
    </header>

    <main class="games-grid">
        <!-- GAME 1 -->
        <a href="3enRaya.html" class="game-card" data-neon="magenta">
            <div class="card-image" style="background-image: url('3raya.webp');"></div>
            <div class="card-content">
                <div class="game-id">SYS_01</div>
                <h3>3 EN RAYA</h3>
            </div>
        </a>

        <!-- GAME 2 -->
        <a href="AdivinaElNumero.html" class="game-card" data-neon="cyan">
            <div class="card-image logic-bg"></div>
            <div class="card-content">
                <div class="game-id">SYS_02</div>
                <h3>EL NÚMERO</h3>
            </div>
        </a>

        <!-- GAME 3 -->
        <a href="Snake.html" class="game-card" data-neon="green">
            <div class="card-image snake-bg"></div>
            <div class="card-content">
                <div class="game-id">SYS_03</div>
                <h3>SNAKE</h3>
            </div>
        </a>

        <!-- GAME 4 -->
        <a href="Memoria.html" class="game-card" data-neon="pink">
            <div class="card-image memory-bg"></div>
            <div class="card-content">
                <div class="game-id">SYS_04</div>
                <h3>MEMORIA</h3>
            </div>
        </a>

        <!-- GAME 5 -->
        <a href="Password.html" class="game-card" data-neon="orange">
            <div class="card-image pass-bg"></div>
            <div class="card-content">
                <div class="game-id">SYS_05</div>
                <h3>CONTRASEÑA</h3>
            </div>
        </a>

        <!-- GAME 6 -->
        <a href="Esquivar.html" class="game-card" data-neon="yellow">
            <div class="card-image dodge-bg"></div>
            <div class="card-content">
                <div class="game-id">SYS_06</div>
                <h3>ESQUIVAR</h3>
            </div>
        </a>
    </main>

    <div class="hub-actions">
        <a href="index.html" class="cyber-btn exit-btn">[ LOGOUT_SYSTEM ]</a>
    </div>

</body>
</html>
